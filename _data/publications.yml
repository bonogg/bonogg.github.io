  - title: "Crushing the Competition: the Pro-Competitive Effects of Relative Performance Evaluation"
    authors: Guido Bongioanni, <a href="https://www.brunopellegrino.com/" target="_blank" rel="noopener">Bruno Pellegrino</a>, <a href="https://www.shihan-shen.com/" target="_blank" rel="noopener">Shihan Shen</a>
    conference_short: WP
    conference: Working Paper
    pdf: files/Gladius_draft_0319.pdf
    notes: "Presentations: SIOE 2023, UChicago Stigler Center Affiliate Conference, EUI, Rice Brownbag, Oligo Workshop 2025, CICM 2025, SED 2025, SEA 2025, Network Science and Economics Conference 2026, EEA-ESEM 2026"
    others: >-
      <p style="font-size:85%;margin-top:5px;text-align:justify;">Relative Performance Evaluation (RPE) is a feature of executive compensation that evaluates a manager’s performance relative to peer firms. Economic theory predicts that, under sufficient risk sharing between managers and shareholders, firms that adopt RPE should engage in more aggressive product-market conduct (i.e. charge lower prices). However, the extent of RPE adoption and its market effects remain disputed: firm disclosures often reference RPE, yet managers’ pay shows little correlation with competitors’ performance despite its well-documented sensitivity to market-wide shocks. We study the adoption and product-market effects of RPE using a network oligopoly model (Pellegrino, 2025) with ultra-realistic managerial incentives, disciplined by granular data from over 350,000 executive compensation contracts. We find that RPE is widespread in form but limited in substance: pay remains tied mainly to absolute objectives, and relative performance is typically benchmarked against broad stock-market indices rather than close rivals. These adoption patterns substantially dampen RPE’s competitive impact, reconciling the seemingly contradictory evidence. Counterfactual simulations indicate that stronger, rival-based RPE could enhance competition and consumer welfare, but such effects remain modest under current practices.</p>

  - title: "When National Priorities Are Not European Priorities: A Note on Industrial Policy in Europe's Production Network"
    authors: "Guido Bongioanni, <a href=\"https://www.tunadokmeci.com/\" target=\"_blank\" rel=\"noopener\">Tuna Dökmeci</a>"
    conference_short: WP
    conference: Working Paper
    pdf: files/industrial_policy_note.pdf
    others: >-
      <p style="font-size:85%;margin-top:5px;text-align:justify;">Governments often need to choose which sectors deserve priority when industrial policy cannot support everything at once. Rankings are one way to make that choice explicit. This note ranks sectors using distortion centrality: a production-network measure that gives higher priority to sectors where a policy wedge, bottleneck, or productivity improvement would have larger effects through input-output linkages. The question is whether sectors that look most important from a national perspective are also the sectors that matter most for the EU as a whole. Using Eurostat FIGARO, we build a 2010–2023 panel of EU27 country-sectors and compare national distortion-centrality rankings with EU-wide rankings. EU-wide priorities are very stable, but they are not the same as national priorities. Adjacent-year EU-wide rank correlations average 0.992, while the average national-versus-EU percentile-rank gap is 0.262. For policy, national rankings identify domestic bottlenecks; EU-wide rankings identify sectors whose importance comes from cross-border supply-chain links.</p>
