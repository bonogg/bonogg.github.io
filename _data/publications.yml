main:

  - title: "Crushing the Competition: the Pro-Competitive Effects of Relative Performance Evaluation"
    authors: Guido Bongioanni, <a href="https://www.brunopellegrino.com/">Bruno Pellegrino</a>, <a href="https://www.shihan-shen.com/">Shihan Shen</a>
    conference_short: WP
    conference: Working Paper
    pdf: files/Gladius_draft_0319.pdf
    notes: "Presentations: SIOE 2023, UChicago Stigler Center Affiliate Conference, EUI, Rice Brownbag, Oligo Workshop 2025, CICM 2025, SED 2025, SEA 2025, Network Science and Economics Conference 2026"
    others: >-
      <p style="font-size:85%;margin-top:5px;">Relative Performance Evaluation (RPE) is a feature of executive compensation that evaluates a manager’s performance relative to peer firms. Economic theory predicts that, under sufficient risk sharing between managers and shareholders, firms that adopt RPE should engage in more aggressive product-market conduct (i.e. charge lower prices). However, the extent of RPE adoption and its market effects remain disputed: firm disclosures often reference RPE, yet managers’ pay shows little correlation with competitors’ performance despite its well-documented sensitivity to market-wide shocks. We study the adoption and product-market effects of RPE using a network oligopoly model (Pellegrino, 2025) with ultra-realistic managerial incentives, disciplined by granular data from over 350,000 executive compensation contracts. We find that RPE is widespread in form but limited in substance: pay remains tied mainly to absolute objectives, and relative performance is typically benchmarked against broad stock-market indices rather than close rivals. These adoption patterns substantially dampen RPE’s competitive impact, reconciling the seemingly contradictory evidence. Counterfactual simulations indicate that stronger, rival-based RPE could enhance competition and consumer welfare, but such effects remain modest under current practices.</p>
