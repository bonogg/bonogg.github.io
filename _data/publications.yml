main:

  - title: "Crushing the Competition: the Pro-Competitive Effects of Relative Performance Evaluation"
    authors: Guido Bongioanni, <a href="https://www.brunopellegrino.com/">Bruno Pellegrino</a>, <a href="https://www.shihan-shen.com/">Shihan Shen</a>
    conference_short: WP
    conference: Working Paper
    pdf: files/Gladius_draft_0319.pdf
    notes: "Presentations: SIOE 2023, UChicago Stigler Center Affiliate Conference, EUI, Rice Brownbag, Oligo Workshop 2025, CICM 2025, SED 2025, SEA 2025, Network Science and Economics Conference 2026"
    others: >-
      <p style="font-size:85%;margin-top:5px;">Relative Performance Evaluation (RPE) is a common feature of executive compensation contracts that is used to incentivize managerial effort. A side effect of RPE that is lesser-known (yet trivial to prove theoretically) is to alter product market conduct, as it provides a motive for managers to hurt competitors' profits rather than pursue the maximization of their own firm's profits. To quantify these effects, we build a general equilibrium model of oligopoly with GHL demand and ultra-realistic managerial incentives.</p>
